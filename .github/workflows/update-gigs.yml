name: Update gig data

on:
  schedule:
    - cron: '0 5 * * *' # daily at 05:00 UTC
  workflow_dispatch: {} # manual "refresh now" button in the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch gigs
        run: node scripts/fetch-gigs.mjs
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          BANDSINTOWN_APP_ID: ${{ secrets.BANDSINTOWN_APP_ID }}

      - name: Commit updated data
        run: |
          git config user.name "gig-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/gigs.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update gig data ($(date -u +%F))"
            git push
          fi
