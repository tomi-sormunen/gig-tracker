name: Update gig data

on:
  schedule:
    - cron: '0 5 * * *' # daily at 05:00 UTC
  workflow_dispatch: {} # manual "refresh now" button in the Actions tab

# Never let two refreshes run (and race each other's pushes) at once
concurrency:
  group: update-gigs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch gigs
        run: node scripts/fetch-gigs.mjs
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          BANDSINTOWN_APP_ID: ${{ secrets.BANDSINTOWN_APP_ID }}

      - name: Commit updated data
        run: |
          git config user.name "gig-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update gig data ($(date -u +%F))"
          # The fetch takes minutes, so main may have moved since checkout
          # (e.g. a PR merged mid-run). Rebase our data commit onto the
          # latest main and retry; -X theirs resolves any gigs.json clash
          # in favour of this run's fresher data.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (main moved during the run) — rebasing, attempt $attempt"
            git pull --rebase -X theirs origin main
          done
          git push
